[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/run/supervisord.pid
user=root

[unix_http_server]
file=/run/supervisor.sock
chmod=0700
username=root
password=root

[supervisorctl]
serverurl=unix:///run/supervisor.sock
username=root
password=root

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:start_tmux]
command=/usr/bin/tmux new-session -d -s "gdb"
autostart=true
autorestart=false # run once
startsecs=0

[program:sshd]
command=/usr/bin/sshd -D -e
autostart=true
autorestart=true
stdout_logfile=/var/log/sshd.log
stderr_logfile=/var/log/sshd.err

[program:ttyd]
command=/usr/bin/ttyd -W -t 'unicodeVersion=11' -i 127.0.0.1 /tmux.sh pwner
autostart=true
autorestart=true
stdout_logfile=/var/log/ttyd.log
stderr_logfile=/var/log/ttyd.err

[program:monitor]
command=/usr/bin/ttyd -W -t 'unicodeVersion=11' -i 127.0.0.1 -p 7680 /tmux.sh gdb
autostart=true
autorestart=true
stdout_logfile=/var/log/ttyd-monitor.log
stderr_logfile=/var/log/ttyd-monitor.err

[program:nginx]
command=/usr/bin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx.log
stderr_logfile=/var/log/nginx.err

[program:filebrowser]
command=/usr/bin/filebrowser -d /data/filebrowser.db
autostart=true
autorestart=true
stdout_logfile=/var/log/filebrowser.log
stderr_logfile=/var/log/filebrowser.err
